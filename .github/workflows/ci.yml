name: CI Pipeline - API Gestão de Tarefas

# Definição de quando o pipeline será executado
on:
  push:
    branches: [ "main","master"]
  pull_request:
    branches: [ "main", "master"]

jobs:
  build-and-test:
    # Configuração do ambiente de execução
    runs-on: ubuntu-latest

    steps:
    # Checkout do código: Baixa o seu repositório para a VM do GitHub
    - name: Checkout do código
      uses: actions/checkout@v3

    # Configura a versão do Python
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Instalação de dependências
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requerimentos.txt

    # Análise de código com Flake8
    - name: Linting com flake8
      run: |
        flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics

    # Execução dos testes unitários
    - name: Executar testes com pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest api/testes/
